<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spese Condo">
<meta name="theme-color" content="#2D4A3E">
<title>Spese Condominio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
--bg: #F5F2EB; --card: #FEFCF8; --text: #1A1713; --muted: #7A7468;
--accent: #2D4A3E; --accent2: #C4873A; --danger: #B84040; --success: #2D7A4F;
--border: rgba(26,23,19,0.12); --radius: 14px;
--safe-top: env(safe-area-inset-top, 0px);
--safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
.app { max-width: 480px; margin: 0 auto; padding-bottom: calc(90px + var(--safe-bottom)); min-height: 100vh; }
.header { background: var(--accent); padding: calc(28px + var(--safe-top)) 20px 0; color: white; }
.header-inner { padding-bottom: 16px; display: flex; justify-content: space-between; align-items: flex-end; }
.header h1 { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; margin-bottom: 3px; }
.header p { font-size: 13px; opacity: 0.65; }
.sync-status { font-size: 11px; opacity: 0.75; display: flex; align-items: center; gap: 4px; padding-bottom: 4px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #aaa; flex-shrink: 0; }
.sync-dot.ok { background: #6fcf97; }
.sync-dot.err { background: #eb5757; }
.sync-dot.loading { background: #f2c94c; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.tab-bar { background: var(--accent); display: flex; padding: 0 16px 16px; gap: 8px; }
.tab { padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: rgba(255,255,255,0.15); color: white; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
.tab.active { background: white; color: var(--accent); }
.section { padding: 16px 16px 0; }
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.summary-card { background: var(--card); border-radius: var(--radius); padding: 14px; border: 0.5px solid var(--border); }
.summary-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.summary-card .value { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
.summary-card .value.danger { color: var(--danger); }
.summary-card .value.success { color: var(--success); }
.filter-row { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-btn { padding: 6px 14px; border-radius: 20px; font-size: 12px; border: 0.5px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; flex-shrink: 0; }
.filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.spesa-card { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px 16px; margin-bottom: 10px; }
.spesa-card.scaduta { border-left: 3px solid var(--danger); }
.spesa-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.spesa-nome { font-weight: 500; font-size: 15px; line-height: 1.3; }
.spesa-importo { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--accent); white-space: nowrap; }
.spesa-meta { display: flex; gap: 6px; align-items: center; margin-top: 7px; flex-wrap: wrap; }
.badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 500; }
.badge.casa1 { background: #E8F0ED; color: #2D4A3E; }
.badge.montagna { background: #FBF0E4; color: #7A4A10; }
.badge.pagata { background: #E6F4EC; color: #2D7A4F; }
.badge.nonpagata { background: #FAEAEA; color: #B84040; }
.spesa-date { font-size: 12px; color: var(--muted); }
.spesa-pagata-date { font-size: 12px; color: var(--success); margin-top: 4px; }
.spesa-iban { font-size: 12px; color: var(--muted); font-family: monospace; margin-top: 5px; }
.spesa-iban span { color: var(--text); }
.spesa-attach { font-size: 11px; color: var(--accent); margin-top: 4px; }
.scadenza-warning { font-size: 11px; color: var(--danger); margin-top: 4px; font-weight: 500; }
.spesa-actions { display: flex; gap: 8px; margin-top: 10px; border-top: 0.5px solid var(--border); padding-top: 10px; }
.btn-small { flex: 1; padding: 8px 4px; border-radius: 8px; font-size: 12px; font-weight: 500; border: 0.5px solid var(--border); cursor: pointer; font-family: 'DM Sans', sans-serif; background: var(--card); color: var(--text); }
.btn-small.success { background: var(--success); color: white; border-color: var(--success); }
.btn-small.danger { background: var(--danger); color: white; border-color: var(--danger); }
.fab { position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 280px; background: var(--accent2); color: white; border: none; border-radius: 30px; padding: 15px 24px; font-size: 16px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; box-shadow: 0 4px 20px rgba(196,135,58,0.4); z-index: 50; }
.modal-overlay { position: fixed; inset: 0; background: rgba(26,23,19,0.55); display: flex; align-items: flex-end; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 8px 20px calc(28px + var(--safe-bottom)); max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 20px; }
.modal h2 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; margin-bottom: 20px; }
.form-group { margin-bottom: 15px; }
.form-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 0.5px solid var(--border); border-radius: 10px; font-size: 16px; font-family: 'DM Sans', sans-serif; background: white; color: var(--text); -webkit-appearance: none; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
.iban-input { font-family: monospace !important; letter-spacing: 1px; font-size: 14px !important; }
.hint { font-size: 11px; margin-top: 5px; color: var(--muted); }
.hint.valid { color: var(--success); }
.hint.invalid { color: var(--danger); }
.toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
.toggle-label { font-size: 16px; color: var(--text); }
.toggle { width: 50px; height: 30px; background: #D1CBC0; border-radius: 15px; cursor: pointer; position: relative; transition: background 0.25s; border: none; flex-shrink: 0; }
.toggle::after { content: ''; position: absolute; width: 24px; height: 24px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.25s; box-shadow: 0 1px 4px rgba(0,0,0,0.25); }
.toggle.on { background: var(--success); }
.toggle.on::after { transform: translateX(20px); }
.btn-save { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 10px; }
.btn-cancel { width: 100%; padding: 13px; background: none; border: none; color: var(--muted); font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 4px; }
.empty { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.pagamento-overlay { position: fixed; inset: 0; background: rgba(26,23,19,0.55); display: flex; align-items: center; justify-content: center; z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.2s; padding: 20px; }
.pagamento-overlay.open { opacity: 1; pointer-events: all; }
.pagamento-box { background: var(--card); border-radius: 20px; padding: 24px 20px; width: 100%; max-width: 320px; transform: scale(0.95); transition: transform 0.2s; }
.pagamento-overlay.open .pagamento-box { transform: scale(1); }
.pagamento-box h3 { font-family: 'DM Serif Display', serif; font-size: 18px; font-weight: 400; margin-bottom: 6px; }
.pagamento-box p { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.pagamento-box input[type=date] { width: 100%; padding: 12px 14px; border: 0.5px solid var(--border); border-radius: 10px; font-size: 16px; font-family: 'DM Sans', sans-serif; background: white; color: var(--text); -webkit-appearance: none; margin-bottom: 14px; }
.pagamento-box input[type=date]:focus { outline: none; border-color: var(--accent); }
.pagamento-btns { display: flex; gap: 8px; }
.pagamento-btns button { flex: 1; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; border: 0.5px solid var(--border); }
.btn-conferma { background: var(--success); color: white; border-color: var(--success) !important; }
.btn-annulla-pag { background: var(--card); color: var(--muted); }
</style>
</head>
<body>
<div class="app">
<div class="header">
 <div class="header-inner">
   <div>
     <h1>Spese Condominio</h1>
     <p>Gestisci le spese dei tuoi immobili</p>
   </div>
   <div class="sync-status" id="sync-status">
     <div class="sync-dot loading" id="sync-dot"></div>
     <span id="sync-text">Connessione...</span>
   </div>
 </div>
</div>
<div class="tab-bar">
 <button class="tab active" id="tab-tutte" onclick="switchTab('tutte')">Tutte</button>
 <button class="tab" id="tab-casa1" onclick="switchTab('casa1')">Prima casa</button>
 <button class="tab" id="tab-montagna" onclick="switchTab('montagna')">Montagna</button>
</div>
<div class="section">
 <div class="summary-grid">
   <div class="summary-card"><div class="label">Totale spese</div><div class="value" id="tot-totale">€0,00</div></div>
   <div class="summary-card"><div class="label">Da pagare</div><div class="value danger" id="tot-nonpagato">€0,00</div></div>
   <div class="summary-card"><div class="label">Pagate</div><div class="value success" id="tot-pagato">€0,00</div></div>
   <div class="summary-card"><div class="label">In scadenza</div><div class="value danger" id="tot-scadenza">0</div></div>
 </div>
 <div class="filter-row">
   <button class="filter-btn active" id="f-tutte" onclick="setFilter('tutte')">Tutte</button>
   <button class="filter-btn" id="f-pagate" onclick="setFilter('pagate')">Pagate</button>
   <button class="filter-btn" id="f-nonpagate" onclick="setFilter('nonpagate')">Da pagare</button>
   <button class="filter-btn" id="f-scadute" onclick="setFilter('scadute')">Scadute</button>
 </div>
 <div id="lista-spese"></div>
</div>
</div>

<button class="fab" onclick="openModal(null)">+ Nuova spesa</button>

<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
<div class="modal" id="modal">
 <div class="modal-handle"></div>
 <h2 id="modal-title">Nuova spesa</h2>
 <div class="form-group">
   <label>Descrizione</label>
   <input type="text" id="f-nome" placeholder="es. Manutenzione ascensore" autocomplete="off" />
 </div>
 <div class="form-group">
   <label>Importo (€)</label>
   <input type="number" id="f-importo" placeholder="0,00" step="0.01" min="0" inputmode="decimal" />
 </div>
 <div class="form-group">
   <label>IBAN beneficiario</label>
   <input type="text" id="f-iban" class="iban-input" placeholder="IT60 X054 2811 1010 0000 0123 456" maxlength="34" oninput="formatIban(this)" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
   <div class="hint" id="iban-hint">Facoltativo</div>
 </div>
 <div class="form-group">
   <label>Immobile</label>
   <select id="f-immobile">
     <option value="casa1">Prima casa</option>
     <option value="montagna">Casa di montagna</option>
   </select>
 </div>
 <div class="form-group">
   <label>Data scadenza</label>
   <input type="date" id="f-scadenza" />
 </div>
 <div class="form-group">
   <div class="toggle-row">
     <span class="toggle-label">Già pagata</span>
     <button class="toggle" id="toggle-pagata" onclick="togglePagata()"></button>
   </div>
 </div>
 <div class="form-group" id="group-data-pagamento" style="display:none">
   <label>Data pagamento</label>
   <input type="date" id="f-data-pagamento" />
 </div>
 <div class="form-group">
   <label>Documento allegato</label>
   <input type="file" id="f-file" accept=".pdf,.jpg,.jpeg,.png" onchange="handleFile(this)" />
   <div class="hint" id="attach-name"></div>
 </div>
 <button class="btn-save" onclick="saveSpesa()">Salva</button>
 <button class="btn-cancel" onclick="closeModal()">Annulla</button>
</div>
</div>

<div class="pagamento-overlay" id="pagamento-overlay">
 <div class="pagamento-box">
   <h3>Data di pagamento</h3>
   <p>Inserisci la data in cui hai pagato</p>
   <input type="date" id="p-data" />
   <div class="pagamento-btns">
     <button class="btn-annulla-pag" onclick="chiudiPagamento()">Annulla</button>
     <button class="btn-conferma" onclick="confermaPagamento()">Conferma</button>
   </div>
 </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyBFzRfzZUUNSSJ3w08zG1K08aMpTpSJ0zI",
 authDomain: "spese-conto-d1775.firebaseapp.com",
 projectId: "spese-conto-d1775",
 storageBucket: "spese-conto-d1775.firebasestorage.app",
 messagingSenderId: "989458136531",
 appId: "1:989458136531:web:7bdcc52b4e0bc9de2ac326",
 measurementId: "G-SLKWTVHZD6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const speseRef = collection(db, "spese");

window._spese = [];
window._tabAttivo = 'tutte';
window._filtroAttivo = 'tutte';
window._pagataToggle = false;
window._fileAllegato = null;
window._editId = null;
window._pagamentoId = null;

function setSyncStatus(stato, testo) {
 document.getElementById('sync-dot').className = 'sync-dot ' + stato;
 document.getElementById('sync-text').textContent = testo;
}

function oggi() { return new Date().toISOString().split('T')[0]; }
function isScaduta(s) { return !s.pagata && s.scadenza && s.scadenza < oggi(); }
function isInScadenza(s) {
 if (s.pagata || !s.scadenza) return false;
 var diff = (new Date(s.scadenza) - new Date()) / (1000*60*60*24);
 return diff >= 0 && diff <= 7;
}
function fmt(n) { return '€' + Number(n).toLocaleString('it-IT', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(d) { if (!d) return ''; var p = d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

onSnapshot(speseRef, function(snapshot) {
 window._spese = [];
 snapshot.forEach(function(docSnap) {
   var d = docSnap.data(); d.id = docSnap.id;
   window._spese.push(d);
 });
 setSyncStatus('ok', 'Sincronizzato');
 renderLista();
}, function(error) {
 setSyncStatus('err', 'Errore connessione');
 console.error(error);
});

window.marcaPagata = function(id) {
 window._pagamentoId = id;
 document.getElementById('p-data').value = oggi();
 document.getElementById('pagamento-overlay').classList.add('open');
};

window.chiudiPagamento = function() {
 document.getElementById('pagamento-overlay').classList.remove('open');
 window._pagamentoId = null;
};

window.confermaPagamento = async function() {
 var data = document.getElementById('p-data').value;
 if (!data) { alert('Inserisci la data di pagamento'); return; }
 setSyncStatus('loading', 'Salvataggio...');
 await updateDoc(doc(db, "spese", window._pagamentoId), { pagata: true, dataPagamento: data });
 window.chiudiPagamento();
};

window.marcaNonPagata = async function(id) {
 setSyncStatus('loading', 'Salvataggio...');
 await updateDoc(doc(db, "spese", id), { pagata: false, dataPagamento: null });
};

window.eliminaSpesa = async function(id) {
 if (confirm('Eliminare questa spesa?')) await deleteDoc(doc(db, "spese", id));
};

window.editSpesa = function(id) { window.openModal(id); };

window.saveSpesa = async function() {
 var nome = document.getElementById('f-nome').value.trim();
 var importo = document.getElementById('f-importo').value;
 var iban = document.getElementById('f-iban').value.trim();
 var immobile = document.getElementById('f-immobile').value;
 var scadenza = document.getElementById('f-scadenza').value;
 var dataPagamento = document.getElementById('f-data-pagamento').value || null;
 if (!nome || !importo) { alert('Inserisci almeno descrizione e importo'); return; }
 setSyncStatus('loading', 'Salvataggio...');
 if (window._editId) {
   var existing = window._spese.find(function(x){return x.id===window._editId;}) || {};
   await updateDoc(doc(db, "spese", window._editId), {
     nome: nome, importo: parseFloat(importo), iban: iban,
     immobile: immobile, scadenza: scadenza, pagata: window._pagataToggle,
     dataPagamento: window._pagataToggle ? (dataPagamento || existing.dataPagamento || null) : null,
     fileName: window._fileAllegato ? window._fileAllegato.name : (existing.fileName || null)
   });
 } else {
   await addDoc(speseRef, {
     nome: nome, importo: parseFloat(importo), iban: iban,
     immobile: immobile, scadenza: scadenza, pagata: window._pagataToggle,
     dataPagamento: window._pagataToggle ? (dataPagamento || null) : null,
     fileName: window._fileAllegato ? window._fileAllegato.name : null,
     creata: oggi(), timestamp: serverTimestamp()
   });
 }
 window.closeModal();
};

function renderLista() {
 var lista = window._spese.slice();
 if (window._tabAttivo === 'casa1') lista = lista.filter(function(s){ return s.immobile === 'casa1'; });
 else if (window._tabAttivo === 'montagna') lista = lista.filter(function(s){ return s.immobile === 'montagna'; });
 if (window._filtroAttivo === 'pagate') lista = lista.filter(function(s){ return s.pagata; });
 else if (window._filtroAttivo === 'nonpagate') lista = lista.filter(function(s){ return !s.pagata; });
 else if (window._filtroAttivo === 'scadute') lista = lista.filter(function(s){ return isScaduta(s); });
 lista.sort(function(a,b) {
   var da = a.scadenza || '9999'; var db2 = b.scadenza || '9999';
   return da < db2 ? -1 : da > db2 ? 1 : 0;
 });
 var listaTab = window._tabAttivo === 'tutte' ? window._spese : window._spese.filter(function(s){ return s.immobile === window._tabAttivo; });
 var totale = 0, pagato = 0, nonpagato = 0, inScad = 0;
 listaTab.forEach(function(s) {
   var imp = parseFloat(s.importo) || 0; totale += imp;
   if (s.pagata) pagato += imp; else nonpagato += imp;
   if (isScaduta(s) || isInScadenza(s)) inScad++;
 });
 document.getElementById('tot-totale').textContent = fmt(totale);
 document.getElementById('tot-pagato').textContent = fmt(pagato);
 document.getElementById('tot-nonpagato').textContent = fmt(nonpagato);
 document.getElementById('tot-scadenza').textContent = inScad;
 var el = document.getElementById('lista-spese');
 if (!lista.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>Nessuna spesa trovata</p></div>'; return; }
 el.innerHTML = lista.map(function(s) {
   var scad = isScaduta(s); var vicina = isInScadenza(s);
   return '<div class="spesa-card' + (scad ? ' scaduta' : '') + '">'
     + '<div class="spesa-top"><div class="spesa-nome">' + esc(s.nome) + '</div>'
     + '<div class="spesa-importo">' + fmt(s.importo) + '</div></div>'
     + '<div class="spesa-meta">'
     + '<span class="badge ' + s.immobile + '">' + (s.immobile === 'casa1' ? 'Prima casa' : 'Montagna') + '</span>'
     + '<span class="badge ' + (s.pagata ? 'pagata' : 'nonpagata') + '">' + (s.pagata ? 'Pagata' : 'Da pagare') + '</span>'
     + (s.scadenza ? '<span class="spesa-date">Scad. ' + fmtDate(s.scadenza) + '</span>' : '')
     + '</div>'
     + (s.pagata && s.dataPagamento ? '<div class="spesa-pagata-date">✓ Pagata il ' + fmtDate(s.dataPagamento) + '</div>' : '')
     + (s.iban ? '<div class="spesa-iban">IBAN <span>' + esc(s.iban) + '</span></div>' : '')
     + (scad ? '<div class="scadenza-warning">⚠ Scadenza superata</div>' : '')
     + (vicina ? '<div class="scadenza-warning">⚠ Scade entro 7 giorni</div>' : '')
     + (s.fileName ? '<div class="spesa-attach">📎 ' + esc(s.fileName) + '</div>' : '')
     + '<div class="spesa-actions">'
     + (!s.pagata ? '<button class="btn-small success" onclick="marcaPagata(\'' + s.id + '\')">Segna pagata</button>'
                  : '<button class="btn-small" onclick="marcaNonPagata(\'' + s.id + '\')">Non pagata</button>')
     + '<button class="btn-small" onclick="editSpesa(\'' + s.id + '\')">Modifica</button>'
     + '<button class="btn-small danger" onclick="eliminaSpesa(\'' + s.id + '\')">Elimina</button>'
     + '</div></div>';
 }).join('');
}

window.switchTab = function(tab) {
 window._tabAttivo = tab;
 document.getElementById('tab-tutte').classList.toggle('active', tab === 'tutte');
 document.getElementById('tab-casa1').classList.toggle('active', tab === 'casa1');
 document.getElementById('tab-montagna').classList.toggle('active', tab === 'montagna');
 renderLista();
};

window.setFilter = function(f) {
 window._filtroAttivo = f;
 ['tutte','pagate','nonpagate','scadute'].forEach(function(x) {
   document.getElementById('f-'+x).classList.toggle('active', x === f);
 });
 renderLista();
};

window.openModal = function(id) {
 window._editId = id || null;
 window._pagataToggle = false;
 window._fileAllegato = null;
 document.getElementById('attach-name').textContent = '';
 document.getElementById('iban-hint').textContent = 'Facoltativo';
 document.getElementById('iban-hint').className = 'hint';
 document.getElementById('modal-title').textContent = id ? 'Modifica spesa' : 'Nuova spesa';
 document.getElementById('group-data-pagamento').style.display = 'none';
 document.getElementById('f-data-pagamento').value = '';
 if (id) {
   var s = window._spese.find(function(x){return x.id===id;});
   document.getElementById('f-nome').value = s.nome;
   document.getElementById('f-importo').value = s.importo;
   document.getElementById('f-iban').value = s.iban || '';
   document.getElementById('f-immobile').value = s.immobile;
   document.getElementById('f-scadenza').value = s.scadenza || '';
   window._pagataToggle = s.pagata;
   if (s.pagata) {
     document.getElementById('group-data-pagamento').style.display = 'block';
     document.getElementById('f-data-pagamento').value = s.dataPagamento || '';
   }
   if (s.fileName) document.getElementById('attach-name').textContent = '📎 ' + s.fileName;
 } else {
   document.getElementById('f-nome').value = '';
   document.getElementById('f-importo').value = '';
   document.getElementById('f-iban').value = '';
   document.getElementById('f-immobile').value = window._tabAttivo !== 'tutte' ? window._tabAttivo : 'casa1';
   document.getElementById('f-scadenza').value = '';
 }
 document.getElementById('toggle-pagata').className = 'toggle' + (window._pagataToggle ? ' on' : '');
 document.getElementById('modal-overlay').classList.add('open');
};

window.closeModal = function() {
 document.getElementById('modal-overlay').classList.remove('open');
 window._editId = null;
};

window.overlayClick = function(e) {
 if (e.target === document.getElementById('modal-overlay')) window.closeModal();
};

window.togglePagata = function() {
 window._pagataToggle = !window._pagataToggle;
 document.getElementById('toggle-pagata').className = 'toggle' + (window._pagataToggle ? ' on' : '');
 var grp = document.getElementById('group-data-pagamento');
 grp.style.display = window._pagataToggle ? 'block' : 'none';
 if (window._pagataToggle) document.getElementById('f-data-pagamento').value = oggi();
 else document.getElementById('f-data-pagamento').value = '';
};

window.handleFile = function(input) {
 if (input.files[0]) {
   window._fileAllegato = { name: input.files[0].name };
   document.getElementById('attach-name').textContent = '📎 ' + input.files[0].name;
 }
};

window.formatIban = function(input) {
 var val = input.value.replace(/\s/g,'').toUpperCase().replace(/[^A-Z0-9]/g,'');
 var groups = val.match(/.{1,4}/g);
 input.value = groups ? groups.join(' ') : val;
 var hint = document.getElementById('iban-hint');
 if (!val) { hint.textContent = 'Facoltativo'; hint.className = 'hint'; return; }
 if (val.length < 15) { hint.textContent = 'IBAN troppo corto'; hint.className = 'hint invalid'; return; }
 var rear = val.slice(4) + val.slice(0,4);
 var num = rear.split('').map(function(c){ return isNaN(c) ? (c.charCodeAt(0)-55).toString() : c; }).join('');
 var rem = 0;
 for (var i = 0; i < num.length; i++) rem = (rem * 10 + parseInt(num[i])) % 97;
 if (rem === 1) { hint.textContent = 'IBAN valido ✓'; hint.className = 'hint valid'; }
 else { hint.textContent = 'IBAN non valido — controlla i dati'; hint.className = 'hint invalid'; }
};
</script>
