<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Documenti Medici">
<meta name="theme-color" content="#1A3A5C">
<title>Documenti Medici</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
--bg: #F0F4F8; --card: #FFFFFF; --text: #1A2A3A; --muted: #6A7A8A;
--accent: #1A3A5C; --accent2: #2E86C1; --danger: #B84040; --success: #2D7A4F;
--border: rgba(26,58,92,0.12); --radius: 14px;
--safe-top: env(safe-area-inset-top, 0px);
--safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
.app { max-width: 480px; margin: 0 auto; padding-bottom: calc(90px + var(--safe-bottom)); min-height: 100vh; }

/* HEADER */
.header { background: var(--accent); padding: calc(28px + var(--safe-top)) 20px 0; color: white; }
.header-inner { padding-bottom: 16px; display: flex; justify-content: space-between; align-items: flex-end; }
.header h1 { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; margin-bottom: 3px; }
.header p { font-size: 13px; opacity: 0.65; }
.sync-status { font-size: 11px; opacity: 0.75; display: flex; align-items: center; gap: 4px; padding-bottom: 4px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #aaa; flex-shrink: 0; }
.sync-dot.ok { background: #6fcf97; }
.sync-dot.err { background: #eb5757; }
.sync-dot.loading { background: #f2c94c; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* SPECIALISTI GRID */
.section { padding: 16px 16px 0; }
.specialisti-grid { display: flex; flex-direction: column; gap: 10px; }
.specialista-card { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
.specialista-card:active { background: #eef2f7; }
.specialista-left { display: flex; align-items: center; gap: 14px; }
.specialista-emoji { font-size: 28px; width: 44px; height: 44px; background: #EEF4FB; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.specialista-info { display: flex; flex-direction: column; gap: 2px; }
.specialista-nome { font-weight: 500; font-size: 15px; }
.specialista-count { font-size: 12px; color: var(--muted); }
.specialista-arrow { color: var(--muted); font-size: 20px; }

/* FAB aggiungi specialista */
.fab { position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 280px; background: var(--accent2); color: white; border: none; border-radius: 30px; padding: 15px 24px; font-size: 16px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; box-shadow: 0 4px 20px rgba(46,134,193,0.4); z-index: 50; }

/* MODAL BASE */
.modal-overlay { position: fixed; inset: 0; background: rgba(26,42,58,0.55); display: flex; align-items: flex-end; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 8px 20px calc(28px + var(--safe-bottom)); max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 20px; }
.modal h2 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; margin-bottom: 20px; }

/* FORM */
.form-group { margin-bottom: 15px; }
.form-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 14px; border: 0.5px solid var(--border); border-radius: 10px; font-size: 16px; font-family: 'DM Sans', sans-serif; background: white; color: var(--text); -webkit-appearance: none; }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }

/* UPLOAD */
.upload-area { border: 1.5px dashed var(--border); border-radius: 10px; padding: 16px; text-align: center; cursor: pointer; margin-top: 6px; transition: border-color 0.15s; }
.upload-area.has-file { border-color: var(--success); background: #f0faf4; }
.upload-area-text { font-size: 13px; color: var(--muted); }
.upload-area-text span { color: var(--accent2); font-weight: 500; }
.file-preview-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
.file-preview-item { font-size: 12px; background: #f8fafc; padding: 8px 12px; border-radius: 8px; border: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.remove-file { color: var(--danger); font-weight: 500; cursor: pointer; padding: 4px; }

/* BOTTONI */
.btn-save { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 10px; }
.btn-cancel { width: 100%; padding: 13px; background: none; border: none; color: var(--muted); font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 4px; }
.btn-nuova { width: 100%; padding: 12px; background: var(--card); color: var(--accent); border: 0.5px solid var(--accent); border-radius: 10px; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-bottom: 10px; }
.btn-small { flex: 1; padding: 8px 4px; border-radius: 8px; font-size: 12px; font-weight: 500; border: 0.5px solid var(--border); cursor: pointer; font-family: 'DM Sans', sans-serif; background: var(--card); color: var(--text); }
.btn-small.danger { background: var(--danger); color: white; border-color: var(--danger); }

/* ESAMI LISTA */
.esame-item { background: white; border-radius: 12px; border: 0.5px solid var(--border); padding: 14px; margin-bottom: 10px; }
.esame-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.esame-tipo { font-weight: 500; font-size: 15px; line-height: 1.3; }
.esame-data { font-size: 12px; color: var(--muted); margin-top: 4px; }
.esame-medico { font-size: 12px; color: var(--accent2); margin-top: 3px; }
.esame-note { font-size: 12px; color: var(--muted); margin-top: 5px; font-style: italic; border-top: 0.5px solid var(--border); padding-top: 6px; }
.esame-file-link { font-size: 12px; color: var(--accent2); margin-top: 6px; cursor: pointer; display: flex; align-items: center; gap: 5px; text-decoration: underline; }
.esame-actions { display: flex; gap: 8px; margin-top: 10px; border-top: 0.5px solid var(--border); padding-top: 10px; }

/* FORM ESAME */
.esame-form { background: #f8fafc; border-radius: 12px; border: 0.5px solid var(--border); padding: 16px; margin-bottom: 16px; }
.esame-form h4 { font-family: 'DM Serif Display', serif; font-size: 16px; font-weight: 400; margin-bottom: 14px; color: var(--accent); }

/* EMPTY */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }

/* VISUALIZZATORE FILE */
#file-viewer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:500; flex-direction:column; }
#file-viewer-bar { display:flex; justify-content:space-between; align-items:center; padding:calc(16px + var(--safe-top)) 16px 12px; background:#1a2a3a; }
#file-viewer-title { color:white; font-size:15px; font-weight:500; font-family:'DM Sans',sans-serif; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:75%; }
#file-viewer-close { background:rgba(255,255,255,0.15); border:none; color:white; font-size:14px; font-weight:500; font-family:'DM Sans',sans-serif; padding:8px 16px; border-radius:20px; cursor:pointer; }
#file-viewer-content { flex:1; overflow:auto; display:flex; align-items:center; justify-content:center; padding:8px; }

/* MODAL SPECIALISTA */
.center-modal-overlay { position:fixed; inset:0; background:rgba(26,42,58,0.55); display:flex; align-items:center; justify-content:center; z-index:300; opacity:0; pointer-events:none; transition:opacity 0.2s; padding:20px; }
.center-modal-overlay.open { opacity:1; pointer-events:all; }
.center-modal-box { background:var(--card); border-radius:20px; padding:24px 20px; width:100%; max-width:340px; transform:scale(0.95); transition:transform 0.2s; }
.center-modal-overlay.open .center-modal-box { transform:scale(1); }
.center-modal-box h3 { font-family:'DM Serif Display',serif; font-size:18px; font-weight:400; margin-bottom:16px; }
.center-modal-btns { display:flex; gap:8px; margin-top:16px; }
.center-modal-btns button { flex:1; padding:12px; border-radius:10px; font-size:14px; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; border:0.5px solid var(--border); }
.btn-conferma-modal { background:var(--accent); color:white; border-color:var(--accent) !important; }
.btn-annulla-modal { background:var(--card); color:var(--muted); }

/* EMOJI PICKER */
.emoji-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.emoji-opt { font-size:24px; padding:6px; border-radius:8px; cursor:pointer; border:2px solid transparent; transition:border-color 0.15s; }
.emoji-opt.sel { border-color:var(--accent2); background:#eef4fb; }
</style>
</head>
<body>
<div class="app">
<div class="header">
 <div class="header-inner">
   <div>
     <h1>Documenti Medici</h1>
     <p>Archivio esami e visite specialistiche</p>
   </div>
   <div class="sync-status" id="sync-status">
     <div class="sync-dot loading" id="sync-dot"></div>
     <span id="sync-text">Connessione...</span>
   </div>
 </div>
</div>

<div class="section">
 <div class="specialisti-grid" id="specialisti-grid"></div>
</div>
</div>

<button class="fab" onclick="openNuovoSpecialista()">+ Nuovo specialista</button>

<div class="modal-overlay" id="modal-esami-overlay" onclick="overlayClickEsami(event)">
<div class="modal" id="modal-esami">
 <div class="modal-handle"></div>
 <h2 id="modal-esami-title">Specialista</h2>

 <div id="esami-lista"></div>

 <button class="btn-nuova" id="btn-nuovo-esame" onclick="toggleFormEsame()">+ Nuovo esame / visita</button>

 <div class="esame-form" id="esame-form" style="display:none">
   <h4 id="esame-form-title">Nuovo esame</h4>
   <div class="form-group">
     <label>Tipo di esame / visita</label>
     <input type="text" id="e-tipo" placeholder="es. Ecografia, Visita di controllo..." autocomplete="off" />
   </div>
   <div class="form-group">
     <label>Data</label>
     <input type="date" id="e-data" />
   </div>
   <div class="form-group">
     <label>Medico / Dottore</label>
     <input type="text" id="e-medico" placeholder="es. Dott. Rossi" autocomplete="off" />
   </div>
   <div class="form-group">
     <label>Note</label>
     <textarea id="e-note" placeholder="Annotazioni, risultati, terapie..."></textarea>
   </div>
   <div class="form-group">
     <label>Documenti allegati (PDF / Foto)</label>
     <div class="upload-area" id="e-upload-area" onclick="document.getElementById('e-file-input').click()">
       <input type="file" id="e-file-input" accept=".pdf,.jpg,.jpeg,.png" multiple onchange="handleEsameFiles(this)" style="display:none" />
       <div class="upload-area-text" id="e-upload-text">📎 <span>Scegli uno o più file</span><br><small>PDF, JPG, PNG (max 5MB cad.)</small></div>
     </div>
     <div id="file-preview-list" class="file-preview-list"></div>
   </div>
   <button class="btn-save" onclick="salvaEsame()">Salva</button>
 </div>

 <button class="btn-cancel" onclick="closeModalEsami()">Chiudi</button>
</div>
</div>

<div class="center-modal-overlay" id="modal-spec-overlay">
<div class="center-modal-box">
 <h3>Nuovo specialista</h3>
 <div class="form-group">
   <label>Nome specialista</label>
   <input type="text" id="spec-nome" placeholder="es. Neurologo, Ortopedico..." autocomplete="off" />
 </div>
 <div class="form-group">
   <label>Icona</label>
   <div class="emoji-row" id="emoji-row"></div>
 </div>
 <div class="center-modal-btns">
   <button class="btn-annulla-modal" onclick="closeNuovoSpecialista()">Annulla</button>
   <button class="btn-conferma-modal" onclick="salvaSpecialista()">Aggiungi</button>
 </div>
</div>
</div>

<div id="file-viewer-overlay">
 <div id="file-viewer-bar">
   <span id="file-viewer-title"></span>
   <button id="file-viewer-close" onclick="chiudiFileViewer()">✕ Chiudi</button>
 </div>
 <div id="file-viewer-content"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyBFzRfzZUUNSSJ3w08zG1K08aMpTpSJ0zI",
 authDomain: "spese-conto-d1775.firebaseapp.com",
 projectId: "spese-conto-d1775",
 storageBucket: "spese-conto-d1775.firebasestorage.app",
 messagingSenderId: "989458136531",
 appId: "1:989458136531:web:7bdcc52b4e0bc9de2ac326",
 measurementId: "G-SLKWTVHZD6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const specialistiRef = collection(db, "med_specialisti");
const esamiRef = collection(db, "med_esami");

// STATO
window._specialisti = [];
window._esami = {};
window._specialistaAttivo = null;
window._editEsameId = null;
window._esameFormOpen = false;
window._currentFiles = []; // Gestione multi-file
window._specEmoji = '🩺';

const EMOJI_DEFAULT = ['🩺','❤️','🫀','🦷','👁️','🦴','🧠','🫁','💊','🩻','🔬','🩹','🧬','🏥','💉'];

const SPECIALISTI_DEFAULT = [
 { nome: 'Urologo', emoji: '🩺' },
 { nome: 'Oculista', emoji: '👁️' },
 { nome: 'Dermatologo', emoji: '🔬' },
 { nome: 'Dentista', emoji: '🦷' },
 { nome: 'Gastroenterologo', emoji: '🫁' },
 { nome: 'Cardiologo', emoji: '❤️' },
];

function setSyncStatus(stato, testo) {
 document.getElementById('sync-dot').className = 'sync-dot ' + stato;
 document.getElementById('sync-text').textContent = testo;
}
function oggi() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) { if (!d) return ''; var p = d.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// LISTENERS
onSnapshot(specialistiRef, function(snapshot) {
 window._specialisti = [];
 snapshot.forEach(function(d) { var x = d.data(); x.id = d.id; window._specialisti.push(x); });
 window._specialisti.sort(function(a,b){ return (a.ordine||0)-(b.ordine||0); });
 setSyncStatus('ok', 'Sincronizzato');
 renderSpecialisti();
}, function(e) { setSyncStatus('err', 'Errore'); console.error(e); });

onSnapshot(esamiRef, function(snapshot) {
 window._esami = {};
 snapshot.forEach(function(d) { 
   var x = d.data(); 
   x.id = d.id; 
   if (!window._esami[x.specialistaId]) window._esami[x.specialistaId] = []; 
   window._esami[x.specialistaId].push(x); 
 });
 Object.keys(window._esami).forEach(function(k) { window._esami[k].sort(function(a,b){ return (b.data||'')>(a.data||'')?1:-1; }); });
 renderSpecialisti();
 if (window._specialistaAttivo) renderEsamiLista();
}, function(e) { console.error(e); });

async function initDefaults() {
 var snap = await new Promise(function(res) { var u = onSnapshot(specialistiRef, function(s) { u(); res(s); }); });
 if (snap.empty) {
   for (var i = 0; i < SPECIALISTI_DEFAULT.length; i++) {
     await addDoc(specialistiRef, { nome: SPECIALISTI_DEFAULT[i].nome, emoji: SPECIALISTI_DEFAULT[i].emoji, ordine: i });
   }
 }
}
initDefaults();

function renderSpecialisti() {
 var el = document.getElementById('specialisti-grid');
 if (!window._specialisti.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🏥</div><p>Nessuno specialista ancora</p></div>'; return; }
 el.innerHTML = window._specialisti.map(function(s) {
   var count = (window._esami[s.id] || []).length;
   return '<div class="specialista-card" onclick="openModalEsami(\'' + s.id + '\')">'
     + '<div class="specialista-left">'
     + '<div class="specialista-emoji">' + s.emoji + '</div>'
     + '<div class="specialista-info">'
     + '<div class="specialista-nome">' + esc(s.nome) + '</div>'
     + '<div class="specialista-count">' + (count > 0 ? count + ' document' + (count===1?'o':'i') : 'Nessun documento') + '</div>'
     + '</div></div>'
     + '<div class="specialista-arrow">›</div>'
     + '</div>';
 }).join('');
}

window.openModalEsami = function(specId) {
 window._specialistaAttivo = specId;
 window._editEsameId = null;
 window._esameFormOpen = false;
 window._currentFiles = [];
 var spec = window._specialisti.find(function(s){ return s.id === specId; });
 document.getElementById('modal-esami-title').textContent = spec ? spec.emoji + ' ' + spec.nome : 'Specialista';
 document.getElementById('esame-form').style.display = 'none';
 document.getElementById('btn-nuovo-esame').textContent = '+ Nuovo esame / visita';
 resetFormEsame();
 renderEsamiLista();
 document.getElementById('modal-esami-overlay').classList.add('open');
};

window.closeModalEsami = function() {
 document.getElementById('modal-esami-overlay').classList.remove('open');
 window._specialistaAttivo = null;
};

window.overlayClickEsami = function(e) {
 if (e.target === document.getElementById('modal-esami-overlay')) window.closeModalEsami();
};

function resetFormEsame() {
 document.getElementById('e-tipo').value = '';
 document.getElementById('e-data').value = oggi();
 document.getElementById('e-medico').value = '';
 document.getElementById('e-note').value = '';
 document.getElementById('e-file-input').value = '';
 document.getElementById('e-upload-text').innerHTML = '📎 <span>Scegli uno o più file</span><br><small>PDF, JPG, PNG (max 5MB cad.)</small>';
 document.getElementById('e-upload-area').classList.remove('has-file');
 document.getElementById('file-preview-list').innerHTML = '';
 window._currentFiles = [];
}

function renderEsamiLista() {
 var lista = window._esami[window._specialistaAttivo] || [];
 var el = document.getElementById('esami-lista');
 if (!lista.length) { el.innerHTML = '<div class="empty" style="padding:24px 0"><div class="empty-icon">📋</div><p>Nessun documento ancora</p></div>'; return; }
 el.innerHTML = lista.map(function(e) {
   let filesHtml = '';
   // Supporto sia per il vecchio formato (fileBase64 singolo) che per il nuovo (array 'files')
   if (e.files && Array.isArray(e.files)) {
     filesHtml = e.files.map((f, idx) => 
       `<div class="esame-file-link" onclick="apriEsameFileSpecifico('${e.id}', ${idx})">📎 ${esc(f.name)}</div>`
     ).join('');
   } else if (e.fileBase64) {
     filesHtml = `<div class="esame-file-link" onclick="apriEsameFileVechio('${e.id}')">📎 ${esc(e.fileName || 'Documento')}</div>`;
   }

   return '<div class="esame-item">'
     + '<div class="esame-top">'
     + '<div style="flex:1">'
     + '<div class="esame-tipo">' + esc(e.tipo) + '</div>'
     + '<div class="esame-data">📅 ' + fmtDate(e.data) + '</div>'
     + (e.medico ? '<div class="esame-medico">👨‍⚕️ ' + esc(e.medico) + '</div>' : '')
     + '<div style="margin-top:8px">' + filesHtml + '</div>'
     + '</div></div>'
     + (e.note ? '<div class="esame-note">' + esc(e.note) + '</div>' : '')
     + '<div class="esame-actions">'
     + '<button class="btn-small" onclick="modificaEsame(\'' + e.id + '\')">Modifica</button>'
     + '<button class="btn-small danger" onclick="eliminaEsame(\'' + e.id + '\')">Elimina</button>'
     + '</div>'
     + '</div>';
 }).join('');
}

window.handleEsameFiles = function(input) {
 if (!input.files.length) return;
 const files = Array.from(input.files);
 
 files.forEach(file => {
   if (file.size > 5 * 1024 * 1024) { alert(`File ${file.name} troppo grande (max 5MB)`); return; }
   const reader = new FileReader();
   reader.onload = function(e) {
     window._currentFiles.push({ name: file.name, base64: e.target.result });
     updateFilePreview();
   };
   reader.readAsDataURL(file);
 });
 input.value = '';
};

function updateFilePreview() {
 const list = document.getElementById('file-preview-list');
 const area = document.getElementById('e-upload-area');
 if (window._currentFiles.length > 0) {
   area.classList.add('has-file');
   document.getElementById('e-upload-text').innerHTML = `✅ ${window._currentFiles.length} file pronti`;
   list.innerHTML = window._currentFiles.map((f, i) => `
     <div class="file-preview-item">
       <span>📄 ${esc(f.name)}</span>
       <span class="remove-file" onclick="removeFileFromCurrent(${i})">Rimuovi</span>
     </div>
   `).join('');
 } else {
   area.classList.remove('has-file');
   document.getElementById('e-upload-text').innerHTML = '📎 <span>Scegli uno o più file</span><br><small>PDF, JPG, PNG (max 5MB cad.)</small>';
   list.innerHTML = '';
 }
}

window.removeFileFromCurrent = function(index) {
 window._currentFiles.splice(index, 1);
 updateFilePreview();
};

window.toggleFormEsame = function() {
 window._esameFormOpen = !window._esameFormOpen;
 window._editEsameId = null;
 document.getElementById('esame-form').style.display = window._esameFormOpen ? 'block' : 'none';
 document.getElementById('btn-nuovo-esame').textContent = window._esameFormOpen ? '✕ Annulla' : '+ Nuovo esame / visita';
 if (window._esameFormOpen) resetFormEsame();
};

window.salvaEsame = async function() {
 var tipo = document.getElementById('e-tipo').value.trim();
 var data = document.getElementById('e-data').value;
 if (!tipo || !data) { alert('Inserisci tipo e data'); return; }
 
 setSyncStatus('loading', 'Salvataggio...');
 var dati = {
   specialistaId: window._specialistaAttivo,
   tipo: tipo, data: data, 
   medico: document.getElementById('e-medico').value.trim(),
   note: document.getElementById('e-note').value.trim(),
   files: window._currentFiles
 };

 if (window._editEsameId) {
   await updateDoc(doc(db, "med_esami", window._editEsameId), dati);
 } else {
   dati.timestamp = serverTimestamp();
   await addDoc(esamiRef, dati);
 }
 window.toggleFormEsame();
};

window.modificaEsame = function(id) {
 var lista = window._esami[window._specialistaAttivo] || [];
 var e = lista.find(x => x.id === id);
 if (!e) return;
 window._editEsameId = id;
 window._esameFormOpen = true;
 document.getElementById('esame-form').style.display = 'block';
 document.getElementById('btn-nuovo-esame').textContent = '✕ Annulla';
 document.getElementById('e-tipo').value = e.tipo || '';
 document.getElementById('e-data').value = e.data || '';
 document.getElementById('e-medico').value = e.medico || '';
 document.getElementById('e-note').value = e.note || '';
 // Carica file esistenti
 window._currentFiles = e.files ? [...e.files] : (e.fileBase64 ? [{name: e.fileName||'Documento', base64: e.fileBase64}] : []);
 updateFilePreview();
 document.getElementById('esame-form').scrollIntoView({ behavior: 'smooth' });
};

window.eliminaEsame = async function(id) {
 if (confirm('Eliminare questo documento?')) await deleteDoc(doc(db, "med_esami", id));
};

window.apriEsameFileSpecifico = function(id, idx) {
 var e = (window._esami[window._specialistaAttivo] || []).find(x => x.id === id);
 if (e && e.files[idx]) visualizza(e.files[idx].name, e.files[idx].base64);
};

window.apriEsameFileVechio = function(id) {
 var e = (window._esami[window._specialistaAttivo] || []).find(x => x.id === id);
 if (e && e.fileBase64) visualizza(e.fileName || 'Documento', e.fileBase64);
};

function visualizza(nome, base64) {
 var overlay = document.getElementById('file-viewer-overlay');
 var content = document.getElementById('file-viewer-content');
 document.getElementById('file-viewer-title').textContent = nome;
 content.innerHTML = base64.startsWith('data:application/pdf') 
   ? `<iframe src="${base64}" style="width:100%;height:100%;min-height:80vh;border:none;border-radius:8px;"></iframe>`
   : `<img src="${base64}" style="max-width:100%;max-height:85vh;border-radius:8px;object-fit:contain;">`;
 overlay.style.display = 'flex';
}

window.chiudiFileViewer = function() {
 document.getElementById('file-viewer-overlay').style.display = 'none';
 document.getElementById('file-viewer-content').innerHTML = '';
};

// NUOVO SPECIALISTA
window.openNuovoSpecialista = function() {
 window._specEmoji = '🩺';
 document.getElementById('spec-nome').value = '';
 var row = document.getElementById('emoji-row');
 row.innerHTML = EMOJI_DEFAULT.map(em => `<span class="emoji-opt${em === '🩺' ? ' sel' : ''}" onclick="selEmoji('${em}')">${em}</span>`).join('');
 document.getElementById('modal-spec-overlay').classList.add('open');
};

window.closeNuovoSpecialista = function() { document.getElementById('modal-spec-overlay').classList.remove('open'); };

window.selEmoji = function(em) {
 window._specEmoji = em;
 document.querySelectorAll('.emoji-opt').forEach(el => el.classList.toggle('sel', el.textContent === em));
};

window.salvaSpecialista = async function() {
 var nome = document.getElementById('spec-nome').value.trim();
 if (!nome) { alert('Inserisci il nome'); return; }
 await addDoc(specialistiRef, { nome: nome, emoji: window._specEmoji, ordine: window._specialisti.length });
 window.closeNuovoSpecialista();
};
</script>
</body>
</html>
