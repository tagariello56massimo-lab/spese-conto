<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Documenti Medici">
<meta name="theme-color" content="#1A3A5C">
<title>Documenti Medici</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
--bg: #F0F4F8; --card: #FFFFFF; --text: #1A2A3A; --muted: #6A7A8A;
--accent: #1A3A5C; --accent2: #2E86C1; --danger: #B84040; --success: #2D7A4F;
--border: rgba(26,58,92,0.12); --radius: 14px;
--safe-top: env(safe-area-inset-top, 0px);
--safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
.app { max-width: 480px; margin: 0 auto; padding-bottom: calc(90px + var(--safe-bottom)); min-height: 100vh; }

/* HEADER */
.header { background: var(--accent); padding: calc(28px + var(--safe-top)) 20px 0; color: white; }
.header-inner { padding-bottom: 16px; display: flex; justify-content: space-between; align-items: flex-end; }
.header h1 { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; margin-bottom: 3px; }
.header p { font-size: 13px; opacity: 0.65; }
.sync-status { font-size: 11px; opacity: 0.75; display: flex; align-items: center; gap: 4px; padding-bottom: 4px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #aaa; flex-shrink: 0; }
.sync-dot.ok { background: #6fcf97; }
.sync-dot.err { background: #eb5757; }
.sync-dot.loading { background: #f2c94c; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* SPECIALISTI GRID */
.section { padding: 16px 16px 0; }
.specialisti-grid { display: flex; flex-direction: column; gap: 10px; }
.specialista-card { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
.specialista-card:active { background: #eef2f7; }
.specialista-left { display: flex; align-items: center; gap: 14px; }
.specialista-emoji { font-size: 28px; width: 44px; height: 44px; background: #EEF4FB; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.specialista-info { display: flex; flex-direction: column; gap: 2px; }
.specialista-nome { font-weight: 500; font-size: 15px; }
.specialista-count { font-size: 12px; color: var(--muted); }
.specialista-arrow { color: var(--muted); font-size: 20px; }

/* FAB */
.fab { position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 280px; background: var(--accent2); color: white; border: none; border-radius: 30px; padding: 15px 24px; font-size: 16px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; box-shadow: 0 4px 20px rgba(46,134,193,0.4); z-index: 50; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(26,42,58,0.55); display: flex; align-items: flex-end; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 8px 20px calc(28px + var(--safe-bottom)); max-height: 92vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 20px; }
.modal h2 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; margin-bottom: 20px; }

/* FORM */
.form-group { margin-bottom: 15px; }
.form-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
.form-group input, .form-group textarea { width: 100%; padding: 12px 14px; border: 0.5px solid var(--border); border-radius: 10px; font-size: 16px; font-family: 'DM Sans', sans-serif; background: white; color: var(--text); }

/* UPLOAD */
.upload-area { border: 1.5px dashed var(--border); border-radius: 10px; padding: 16px; text-align: center; cursor: pointer; margin-top: 6px; }
.upload-area.has-file { border-color: var(--success); background: #f0faf4; }
.file-preview-item { font-size: 12px; background: #f8fafc; padding: 8px 12px; border-radius: 8px; border: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
.remove-file { color: var(--danger); font-weight: bold; cursor: pointer; }

/* ESAMI */
.esame-item { background: white; border-radius: 12px; border: 0.5px solid var(--border); padding: 14px; margin-bottom: 10px; }
.esame-tipo { font-weight: 500; font-size: 15px; }
.esame-file-link { font-size: 12px; color: var(--accent2); margin-top: 8px; cursor: pointer; text-decoration: underline; display: block; }
.esame-actions { display: flex; gap: 8px; margin-top: 10px; border-top: 0.5px solid var(--border); padding-top: 10px; }

/* VIEWER */
#file-viewer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:500; flex-direction:column; }
#file-viewer-bar { display:flex; justify-content:space-between; align-items:center; padding: 40px 20px 20px; background:#1a2a3a; color: white; }
#file-viewer-content { flex:1; display:flex; align-items:center; justify-content:center; padding:10px; overflow: auto; }

/* MODAL NUOVO SPEC */
.center-modal-overlay { position:fixed; inset:0; background:rgba(26,42,58,0.55); display:flex; align-items:center; justify-content:center; z-index:300; opacity:0; pointer-events:none; transition:opacity 0.2s; padding:20px; }
.center-modal-overlay.open { opacity:1; pointer-events:all; }
.center-modal-box { background:var(--card); border-radius:20px; padding:24px 20px; width:100%; max-width:340px; }
.emoji-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.emoji-opt { font-size:24px; padding:6px; border-radius:8px; cursor:pointer; border:2px solid transparent; }
.emoji-opt.sel { border-color:var(--accent2); background:#eef4fb; }
</style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-inner">
            <div>
                <h1>Documenti Medici</h1>
                <p>Archivio sincronizzato</p>
            </div>
            <div class="sync-status" id="sync-status">
                <div class="sync-dot loading" id="sync-dot"></div>
                <span id="sync-text">Connessione...</span>
            </div>
        </div>
    </div>
    <div class="section">
        <div class="specialisti-grid" id="specialisti-grid"></div>
    </div>
</div>

<button class="fab" onclick="openNuovoSpecialista()">+ Nuovo specialista</button>

<div class="modal-overlay" id="modal-esami-overlay" onclick="overlayClickEsami(event)">
    <div class="modal">
        <div class="modal-handle"></div>
        <h2 id="modal-esami-title">Caricamento...</h2>
        <div id="esami-lista"></div>
        <button class="btn-nuova" id="btn-nuovo-esame" onclick="toggleFormEsame()">+ Nuovo esame / visita</button>
        
        <div class="esame-form" id="esame-form" style="display:none; padding: 15px; background: #f8fafc; border-radius: 12px; margin-bottom: 15px;">
            <div class="form-group"><label>Tipo esame</label><input type="text" id="e-tipo"></div>
            <div class="form-group"><label>Data</label><input type="date" id="e-data"></div>
            <div class="form-group"><label>Medico</label><input type="text" id="e-medico"></div>
            <div class="form-group"><label>Note</label><textarea id="e-note"></textarea></div>
            <div class="form-group">
                <label>Documenti (Max 1MB totale consigliato)</label>
                <div class="upload-area" id="e-upload-area" onclick="document.getElementById('e-file-input').click()">
                    <input type="file" id="e-file-input" accept=".pdf,.jpg,.jpeg,.png" multiple onchange="handleEsameFiles(this)" style="display:none">
                    <div id="e-upload-text">📎 Clicca per allegare file</div>
                </div>
                <div id="file-preview-list"></div>
            </div>
            <button class="btn-save" onclick="salvaEsame()" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px;">Salva Esame</button>
        </div>
        <button class="btn-cancel" onclick="closeModalEsami()" style="width:100%; margin-top:10px;">Chiudi</button>
    </div>
</div>

<div class="center-modal-overlay" id="modal-spec-overlay">
    <div class="center-modal-box">
        <h3>Nuovo specialista</h3>
        <div class="form-group"><label>Nome</label><input type="text" id="spec-nome"></div>
        <div class="form-group"><label>Icona</label><div class="emoji-row" id="emoji-row"></div></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeNuovoSpecialista()" style="flex:1;">Annulla</button>
            <button onclick="salvaSpecialista()" style="flex:1; background:var(--accent); color:white;">Aggiungi</button>
        </div>
    </div>
</div>

<div id="file-viewer-overlay">
    <div id="file-viewer-bar">
        <span id="file-viewer-title">Documento</span>
        <button onclick="chiudiFileViewer()" style="background:white; color:black; padding:5px 15px; border-radius:20px; border:none;">Chiudi</button>
    </div>
    <div id="file-viewer-content"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyBFzRfzZUUNSSJ3w08zG1K08aMpTpSJ0zI",
 authDomain: "spese-conto-d1775.firebaseapp.com",
 projectId: "spese-conto-d1775",
 storageBucket: "spese-conto-d1775.firebasestorage.app",
 messagingSenderId: "989458136531",
 appId: "1:989458136531:web:7bdcc52b4e0bc9de2ac326",
 measurementId: "G-SLKWTVHZD6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const specialistiRef = collection(db, "med_specialisti");
const esamiRef = collection(db, "med_esami");

window._specialisti = [];
window._esami = {};
window._specialistaAttivo = null;
window._currentFiles = [];
window._editEsameId = null;

// SYNC STATUS
function setSyncStatus(stato, testo) {
    document.getElementById('sync-dot').className = 'sync-dot ' + stato;
    document.getElementById('sync-text').textContent = testo;
}

// LISTENERS
onSnapshot(specialistiRef, (snap) => {
    window._specialisti = snap.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b) => (a.ordine||0)-(b.ordine||0));
    setSyncStatus('ok', 'Sincronizzato');
    renderSpecialisti();
});

onSnapshot(esamiRef, (snap) => {
    window._esami = {};
    snap.docs.forEach(d => {
        const x = {id:d.id, ...d.data()};
        if(!window._esami[x.specialistaId]) window._esami[x.specialistaId] = [];
        window._esami[x.specialistaId].push(x);
    });
    if(window._specialistaAttivo) renderEsamiLista();
    renderSpecialisti();
});

// RENDER
function renderSpecialisti() {
    const el = document.getElementById('specialisti-grid');
    el.innerHTML = window._specialisti.map(s => {
        const count = (window._esami[s.id] || []).length;
        return `<div class="specialista-card" onclick="openModalEsami('${s.id}')">
            <div class="specialista-left">
                <div class="specialista-emoji">${s.emoji}</div>
                <div>
                    <div class="specialista-nome">${s.nome}</div>
                    <div class="specialista-count">${count} documenti</div>
                </div>
            </div>
            <div class="specialista-arrow">›</div>
        </div>`;
    }).join('');
}

window.openModalEsami = function(id) {
    window._specialistaAttivo = id;
    const s = window._specialisti.find(x => x.id === id);
    document.getElementById('modal-esami-title').textContent = s ? s.emoji + ' ' + s.nome : 'Esami';
    renderEsamiLista();
    document.getElementById('modal-esami-overlay').classList.add('open');
};

window.closeModalEsami = function() {
    document.getElementById('modal-esami-overlay').classList.remove('open');
    window._specialistaAttivo = null;
    toggleFormEsame(false);
};

window.renderEsamiLista = function() {
    const lista = window._esami[window._specialistaAttivo] || [];
    const el = document.getElementById('esami-lista');
    if(!lista.length) { el.innerHTML = '<p style="text-align:center; padding:20px; color:#666;">Nessun documento.</p>'; return; }
    
    el.innerHTML = lista.map(e => {
        let filesHtml = "";
        if (e.files) {
            filesHtml = e.files.map((f, i) => `<span class="esame-file-link" onclick="viewFile('${e.id}', ${i})">📎 ${f.name}</span>`).join('');
        }
        return `<div class="esame-item">
            <div class="esame-tipo">${e.tipo}</div>
            <div style="font-size:12px; color:#666;">Data: ${e.data} | Medico: ${e.medico || '-'}</div>
            ${filesHtml}
            <div class="esame-actions">
                <button class="btn-small" onclick="modificaEsame('${e.id}')">Modifica</button>
                <button class="btn-small danger" onclick="eliminaEsame('${e.id}')">Elimina</button>
            </div>
        </div>`;
    }).join('');
};

// GESTIONE FILES
window.handleEsameFiles = function(input) {
    const files = Array.from(input.files);
    files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => {
            window._currentFiles.push({ name: file.name, base64: e.target.result });
            updatePreview();
        };
        reader.readAsDataURL(file);
    });
};

function updatePreview() {
    const list = document.getElementById('file-preview-list');
    list.innerHTML = window._currentFiles.map((f, i) => `
        <div class="file-preview-item">
            <span>${f.name}</span>
            <span class="remove-file" onclick="window._currentFiles.splice(${i},1); updatePreview();">X</span>
        </div>
    `).join('');
}

window.salvaEsame = async function() {
    const tipo = document.getElementById('e-tipo').value;
    const data = document.getElementById('e-data').value;
    if(!tipo || !data) return alert("Inserisci tipo e data");

    // Calcolo dimensione stimata
    const size = JSON.stringify(window._currentFiles).length;
    if(size > 1000000) return alert("File troppo grandi per il database (Max 1MB totale). Carica file più piccoli.");

    setSyncStatus('loading', 'Salvataggio...');
    const payload = {
        specialistaId: window._specialistaAttivo,
        tipo, data, 
        medico: document.getElementById('e-medico').value,
        note: document.getElementById('e-note').value,
        files: window._currentFiles,
        updatedAt: serverTimestamp()
    };

    try {
        if(window._editEsameId) {
            await updateDoc(doc(db, "med_esami", window._editEsameId), payload);
        } else {
            await addDoc(esamiRef, payload);
        }
        toggleFormEsame(false);
    } catch(err) {
        alert("Errore nel salvataggio. Forse i file sono troppo grandi.");
        console.error(err);
    }
};

window.viewFile = function(esameId, fileIdx) {
    const e = (window._esami[window._specialistaAttivo] || []).find(x => x.id === esameId);
    const file = e.files[fileIdx];
    const content = document.getElementById('file-viewer-content');
    document.getElementById('file-viewer-title').textContent = file.name;
    
    if(file.base64.includes("pdf")) {
        content.innerHTML = `<iframe src="${file.base64}" style="width:100%; height:80vh; border:none;"></iframe>`;
    } else {
        content.innerHTML = `<img src="${file.base64}" style="max-width:100%; border-radius:10px;">`;
    }
    document.getElementById('file-viewer-overlay').style.display = 'flex';
};

window.chiudiFileViewer = () => { document.getElementById('file-viewer-overlay').style.display = 'none'; };

window.toggleFormEsame = function(show) {
    window._esameFormOpen = (show !== undefined) ? show : !window._esameFormOpen;
    document.getElementById('esame-form').style.display = window._esameFormOpen ? 'block' : 'none';
    if(!window._esameFormOpen) {
        window._editEsameId = null;
        window._currentFiles = [];
        document.getElementById('e-tipo').value = "";
        updatePreview();
    }
};

window.modificaEsame = function(id) {
    const e = (window._esami[window._specialistaAttivo] || []).find(x => x.id === id);
    window._editEsameId = id;
    document.getElementById('e-tipo').value = e.tipo;
    document.getElementById('e-data').value = e.data;
    document.getElementById('e-medico').value = e.medico;
    document.getElementById('e-note').value = e.note;
    window._currentFiles = e.files ? [...e.files] : [];
    updatePreview();
    toggleFormEsame(true);
};

window.eliminaEsame = async (id) => { if(confirm("Elimina?")) await deleteDoc(doc(db, "med_esami", id)); };

// FUNZIONI SPECIALISTA (LOGICA BASE)
window.openNuovoSpecialista = () => { 
    document.getElementById('modal-spec-overlay').classList.add('open');
    const row = document.getElementById('emoji-row');
    row.innerHTML = ['🩺','❤️','🦷','👁️','🧠','💊'].map(em => `<span class="emoji-opt" onclick="window._selEmoji='${em}'; document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('sel')); this.classList.add('sel');">${em}</span>`).join('');
};
window.closeNuovoSpecialista = () => document.getElementById('modal-spec-overlay').classList.remove('open');
window.salvaSpecialista = async () => {
    const nome = document.getElementById('spec-nome').value;
    if(!nome) return;
    await addDoc(specialistiRef, { nome, emoji: window._selEmoji || '🩺', ordine: window._specialisti.length });
    closeNuovoSpecialista();
};

window.overlayClickEsami = (e) => { if(e.target.id === 'modal-esami-overlay') closeModalEsami(); };
</script>

</body>
</html>
